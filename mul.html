<html>
    <body>
        <style>
            .container {
                width: 300px;
                margin: 0 auto;
                padding: 20px;
                border: 1px solid #ccc;
                border-radius: 5px;
                background-color: #f9f9f9;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            h2 {
                text-align: center;
            }
            input[type="text"] {
                width: 100%;
                padding: 8px;
                margin: 10px 0;
                box-sizing: border-box;
            }
            input[type="submit"] {
                width: 100%;
                padding: 8px;
                background-color: #4CAF50;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            input[type="submit"]:hover {
                background-color: #45a049;
            }
        </style>
        <div class="container">
        <h2>Multiplication Table</h2>
        <form action="mul1.jsp" method="post">
                <label for="Multiplication">Enter a number:</label>
                <input type="text" id="Multiplication" name="Multiplication" property="number" /><br>
            <input type="submit" value="Generate table" />
        </form>
        </div>
    </body>
</html>
